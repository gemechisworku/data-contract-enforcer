kind: DataContract
apiVersion: v3.0.0
id: week3-document-refinery-extractions
info:
  title: Week 3 Document Refinery — Extraction Records
  version: 1.0.0
  owner: week3-team
  description: Auto-generated by ContractGenerator. Flattened columns for JSONL profiling;
    nested logical arrays appear as JSON strings or fact_* columns.
servers:
  local:
    type: local
    path: outputs/migrate/week3/extractions.jsonl
    format: jsonl
terms:
  usage: Internal inter-system data contract. Do not publish without review.
  limitations: See schema field descriptions for breaking-change risks.
schema:
  doc_id:
    type: string
    required: true
    description: 'Profiled `doc_id`: pandas object, ~0.00% nulls, cardinality ~33.'
    format: uuid
    pattern: ^[0-9a-fA-F-]{36}$
  source_path:
    type: string
    required: true
    description: 'Profiled `source_path`: pandas object, ~0.00% nulls, cardinality
      ~1.'
    enum:
    - unknown
  source_hash:
    type: string
    required: true
    description: SHA-256 of source file (hex).
    pattern: ^[a-f0-9]{64}$
  extraction_model:
    type: string
    required: true
    description: 'Profiled `extraction_model`: pandas object, ~0.00% nulls, cardinality
      ~1.'
    enum:
    - unknown
  processing_time_ms:
    type: integer
    required: true
    description: 'Profiled `processing_time_ms`: pandas int64, ~0.00% nulls, cardinality
      ~24.'
  extracted_at:
    type: string
    required: true
    description: 'Profiled `extracted_at`: pandas object, ~0.00% nulls, cardinality
      ~26.'
    format: date-time
  fact_fact_id:
    type: string
    required: true
    description: 'Profiled `fact_fact_id`: pandas object, ~0.00% nulls, cardinality
      ~33.'
    format: uuid
    pattern: ^[0-9a-fA-F-]{36}$
  fact_text:
    type: string
    required: true
    description: 'Profiled `fact_text`: pandas object, ~0.00% nulls, cardinality ~33.'
  fact_entity_refs:
    type: string
    required: true
    description: 'Profiled `fact_entity_refs`: pandas object, ~0.00% nulls, cardinality
      ~1.'
    enum:
    - '[]'
  fact_confidence:
    type: number
    required: true
    description: Confidence score. MUST stay 0.0–1.0 float. BREAKING if changed to
      integer 0–100 or different scale.
    minimum: 0.0
    maximum: 1.0
  fact_page_ref:
    type: string
    required: false
    description: 'Profiled `fact_page_ref`: pandas object, ~100.00% nulls, cardinality
      ~0.'
  fact_source_excerpt:
    type: string
    required: true
    description: 'Profiled `fact_source_excerpt`: pandas object, ~0.00% nulls, cardinality
      ~1.'
    enum:
    - ''
quality:
  type: SodaChecks
  specification:
    checks for week3_extractions:
    - missing_count(doc_id) = 0
    - duplicate_count(doc_id) = 0
    - row_count >= 1
    - min(fact_confidence) >= 0.0
    - max(fact_confidence) <= 1.0
lineage:
  upstream: []
  downstream: []
  downstream_consumers: []
generation:
